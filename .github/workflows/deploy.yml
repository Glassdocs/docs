name: Docs Deploy

# Publishes this KB via the Glassdocs secure reusable publisher. Cloudflare
# Access is enforced at the platform — a pre-flight check blocks a publicly
# reachable site, the deploy is rolled back if the site is reachable after
# publish, and preview deployments are disabled. No per-repo access code.
#
# Required repo variable:  CF_PAGES_PROJECT   (e.g. acme-handbook → acme-handbook.pages.dev)
# Optional repo variables:
#   EMAIL_DOMAIN    staff email domain granted access (e.g. acme.com)
#   CLIENT_DOMAIN   one client email domain granted access
#   CLIENT_EMAILS   comma-separated client emails granted access
# Org secrets inherited:   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#
# Fail-closed: with none of EMAIL_DOMAIN / CLIENT_DOMAIN / CLIENT_EMAILS set,
# the site deploys locked (no one is granted access) rather than public.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Skip on the template repo itself — a KB is "live" once CF_PAGES_PROJECT is set.
    if: vars.CF_PAGES_PROJECT != ''
    permissions:
      contents: read
      deployments: write
    uses: Glassdocs/publisher/.github/workflows/deploy-pages.yml@v1
    with:
      project-name: ${{ vars.CF_PAGES_PROJECT }}
      email-domain: ${{ vars.EMAIL_DOMAIN }}
      client-domain: ${{ vars.CLIENT_DOMAIN }}
      client-emails: ${{ vars.CLIENT_EMAILS }}
    secrets: inherit
