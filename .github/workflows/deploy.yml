name: Docs Deploy

# Publishes the Glassdocs product documentation via the Glassdocs reusable
# publisher. This KB is world-readable by explicit opt-in (`public: true`
# below): no Cloudflare Access gate, and the post-deploy check verifies the
# site actually serves content. Gated KBs use the same publisher with the
# access variables instead — see docs/publishing.md.
#
# Required repo variable:  CF_PAGES_PROJECT   (glassdocs-docs → docs.glassdocs.site)
# Org secrets inherited:   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Skip on the template repo itself — a KB is "live" once CF_PAGES_PROJECT is set.
    if: vars.CF_PAGES_PROJECT != ''
    permissions:
      contents: read
      deployments: write
    uses: Glassdocs/publisher/.github/workflows/deploy-pages.yml@v1
    with:
      project-name: ${{ vars.CF_PAGES_PROJECT }}
      # This is the Glassdocs product documentation — world-readable by
      # explicit opt-in. Access-grant variables are intentionally absent.
      public: true
    secrets: inherit
