# Glassdocs KB template — built with Zensical (the MkDocs successor).
# Zensical reads this mkdocs.yml unchanged. Customise: site_name, nav.
site_name: Glassdocs Documentation
site_description: Complete documentation for Glassdocs — Markdown knowledge bases, secure publishing, and the AI docs-chat extension. This site is itself a Glassdocs KB, published with the Glassdocs publisher.
site_url: https://docs.glassdocs.site/
docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - assets/mermaid-init.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

# Hide the generator footer badge (client-facing KBs).
extra:
  generator: false

nav:
  - What is Glassdocs: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - Writing a KB: authoring.md
  - Publishing: publishing.md
  - Managed Hosting: hosting.md
  - Admin Dashboard: admin.md
  - Browser Extension: extension.md
  - Enterprise Deployment: enterprise.md
  - API Reference: api.md
  - "Security & Privacy": security.md
  - Credits: credits.md
